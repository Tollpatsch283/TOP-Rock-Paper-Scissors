<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="index.css" rel="stylesheet" />
    <title>Document</title>
</head>

<body>
    <div id="game-container">
        <h1 class="banner welcome">Welcome to Rock, Paper, Scissors!</h1>
        <h2 class="prompt">Would you like to play?</h2>

        <div class="options">
            <div class="answer yes">
                <p>Yes</p>
            </div>
            <div class="answer no">
                <p>No</p>
            </div>
            <div class="option rock">
                <p>Rock</p>
            </div>
            <div class="option paper">
                <p>Paper</p>
            </div>
            <div class="option scissors">
                <p>Scissors</p>
            </div>
        </div>
    </div>

    <script src="main.js">

    </script>
</body>

</html>
